---
deployment:
  tasks:
    - export DEPLOYPATH=/home2/trioitlv/serv.trioit.lv
    - /bin/cp -R web/dist $DEPLOYPATH/backend/
    - /bin/cp -R web/public $DEPLOYPATH/backend/
    - /bin/cp web/package.json web/server.js web/package-lock.json $DEPLOYPATH/backend/
    - /bin/cp -R web/database/migrations $DEPLOYPATH/backend/database/ 2>/dev/null || true
    - mkdir -p $DEPLOYPATH/backend/tmp
    - touch $DEPLOYPATH/backend/tmp/restart.txt
