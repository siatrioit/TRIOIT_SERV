name: Build for cPanel upload

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'web/**'
      - 'docs/**'
      - '*.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          echo "VITE_API_URL=/api/v1" > .env.production
          npm install
          npm run build

      - name: Build backend
        run: |
          cd backend
          npm install
          npm run build

      - name: Prepare web/ for cPanel .cpanel.yml deploy
        run: |
          rm -rf web/dist web/public
          mkdir -p web/dist web/public
          cp -r backend/dist/* web/dist/
          cp -r frontend/dist/* web/public/
          cp backend/package.json web/
          cp backend/package-lock.json web/ 2>/dev/null || true

      - name: Commit web/ to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update web/ build for cPanel deploy [skip ci]"
          git push

      - name: Pack manual upload zip (backup)
        run: |
          mkdir -p cpanel-upload/dist cpanel-upload/public
          cp -r web/dist/* cpanel-upload/dist/
          cp -r web/public/* cpanel-upload/public/
          cp web/package.json web/package-lock.json cpanel-upload/
          cd cpanel-upload && zip -r ../trioit-cpanel-upload.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: trioit-cpanel-upload
          path: trioit-cpanel-upload.zip
          retention-days: 30
